    * { box-sizing: border-box; }

    .status-pending  { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
    .status-confirmed{ background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }

    input, select, textarea {

      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
    }
    .btn-gold {
      background: linear-gradient(135deg, #B8860B, #D4A017);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-gold:active { transform: translateY(0); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .divider-ornament {
      display: flex; align-items: center; gap: 12px; color: var(--gold);
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    }
    .divider-ornament::before, .divider-ornament::after {
      content: ''; flex: 1; height: 1px; background: var(--gold-pale);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--gold-pale); border-radius: 3px; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.3s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
    .header-pattern {

const toArr = v => {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  if (typeof v === "object") return Object.values(v).filter(Boolean);
  return [];
};

const uid = () => Math.random().toString(36).slice(2, 9);
const tsNow = () => new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });

/* ── Field defaults ── */
const emptyFlat = () => ({
  unitNo: "", tower: "A",
  ownerName: "", ownerMobile: "", ownerWhatsapp: "", ownerEmail: "",
  isRented: false,
  tenantName: "", tenantMobile: "", tenantEmail: "",
  status: "Pending", lastUpdated: "", id: uid()
});

/* ── INP style ── */
const INP = "w-full px-3 py-2.5 border border-amber-200 rounded-lg text-sm bg-white focus:outline-none";
const LBL = "block text-xs font-semibold text-amber-800 uppercase tracking-wider mb-1.5";

/* ── Components ── */
function Toast({ msg, type }) {
  const colors = { success: "bg-emerald-700", error: "bg-red-700", info: "bg-amber-700" };
  return (
    <div className={`toast fixed top-5 right-5 z-[200] px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-2xl ${colors[type]||"bg-gray-800"}`}>
      {msg}
    </div>
  );
}

function StatusBadge({ status }) {
  return <span className={`status-${status?.toLowerCase()} px-2.5 py-1 rounded-full text-xs font-bold`}>{status}</span>;
}

function Fld({ label, children }) {
  return <div><label className={LBL}>{label}</label>{children}</div>;
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[100] flex items-start justify-center p-4 overflow-y-auto" style={{ background: "rgba(26,20,16,0.6)" }}>
      <div className={`bg-white rounded-2xl shadow-2xl w-full my-6 ${wide ? "max-w-2xl" : "max-w-md"} fade-in`}>
        <div className="flex justify-between items-center px-6 pt-5 pb-4 border-b border-amber-100">
          <h2 className="playfair text-lg font-semibold text-amber-900">{title}</h2>
          <button onClick={onClose} className="text-amber-300 hover:text-amber-700 text-xl font-bold transition-colors">✕</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [records, setRecords] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("home"); // home | admin
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null);
  const [adminPw, setAdminPw] = useState("");
  const [adminAuth, setAdminAuth] = useState(false);
  const [adminPwErr, setAdminPwErr] = useState(false);

  /* resident state */
  const [selTower, setSelTower] = useState("");
  const [selUnit, setSelUnit] = useState("");
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);

  /* admin state */
  const [adminFilter, setAdminFilter] = useState({ tower: "all", status: "all", q: "" });
  const [addFlatForm, setAddFlatForm] = useState(emptyFlat());
  const [syncSt, setSyncSt] = useState("connecting");

  /* Firebase listener */
  useEffect(() => {
    const ref = DB.ref(DB_PATH);
    ref.on("value", snap => {
      try {
        const raw = snap.val();
        if (!raw) {
          // Seed all 126 records
          const seeded = SEED_DATA.map(d => ({
            ...emptyFlat(), ...d,
            id: uid(), status: "Pending", lastUpdated: ""
          }));
          ref.set(seeded).catch(console.error);
        } else {
          setRecords(toArr(raw).filter(Boolean));
          setLoaded(true);
          setSyncSt("synced");
        }
      } catch (e) {
        console.error(e);
        setLoaded(true);
        setSyncSt("error");
      }
    }, e => { console.error(e); setLoaded(true); setSyncSt("error"); });
    return () => ref.off();
  }, []);

  const notify = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2700);
  };

  const saveAll = (list) => {
    setSyncSt("saving");
    DB.ref(DB_PATH).set(list)
      .then(() => setSyncSt("synced"))
      .catch(e => { console.error(e); setSyncSt("error"); });
  };

  /* Resident: load flat for editing */
  const loadFlat = () => {
    if (!selTower || !selUnit) return;
    const rec = records.find(r => r.unitNo === selUnit);
    if (rec) setForm({ ...rec });
    else notify("Flat not found", "error");
  };

  const flatsByTower = (tower) => records.filter(r => r.tower === tower).sort((a, b) => a.unitNo.localeCompare(b.unitNo));

  /* Resident: save */
  const submitForm = () => {
    if (!form) return;
    setSaving(true);
    const wasEdited = JSON.stringify(form) !== JSON.stringify(records.find(r => r.id === form.id));
    const updated = {
      ...form,
      status: wasEdited ? "Updated" : "Confirmed",
      lastUpdated: tsNow()
    };
    const next = records.map(r => r.id === form.id ? updated : r);
    DB.ref(DB_PATH).set(next)
      .then(() => {
        notify(wasEdited ? "✅ Details updated successfully!" : "✅ Details confirmed!");
        setForm(null); setSelUnit(""); setSelTower("");
        setSaving(false);
      })
      .catch(e => { console.error(e); notify("Save failed", "error"); setSaving(false); });
  };

  /* Admin: stats */
  const stats = {
    total: records.length,
    pending: records.filter(r => r.status === "Pending").length,
    confirmed: records.filter(r => r.status === "Confirmed").length,
    updated: records.filter(r => r.status === "Updated").length,
  };

  /* Admin: filtered records */
  const adminRecs = records.filter(r => {
    const tOk = adminFilter.tower === "all" || r.tower === adminFilter.tower;
    const sOk = adminFilter.status === "all" || r.status === adminFilter.status;
    const qOk = !adminFilter.q || r.ownerName?.toLowerCase().includes(adminFilter.q.toLowerCase()) || r.unitNo?.toLowerCase().includes(adminFilter.q.toLowerCase());
    return tOk && sOk && qOk;
  });

  /* Admin: add flat */
  const addFlat = () => {
    if (!addFlatForm.unitNo.trim() || !addFlatForm.ownerName.trim()) { notify("Unit No and Owner Name required", "error"); return; }
    const exists = records.find(r => r.unitNo === addFlatForm.unitNo.trim());
    if (exists) { notify("Unit No already exists", "error"); return; }
    const newRec = { ...addFlatForm, unitNo: addFlatForm.unitNo.trim(), id: uid(), status: "Pending", lastUpdated: "" };
    const next = [...records, newRec];
    saveAll(next);
    notify("Flat added!");
    setModal(null);
    setAddFlatForm(emptyFlat());
  };

  /* Admin: reset status */
  const resetStatus = (id) => {
    const next = records.map(r => r.id === id ? { ...r, status: "Pending", lastUpdated: "" } : r);
    saveAll(next);
    notify("Status reset to Pending");
  };

  /* Excel export */
  const exportExcel = () => {
    const rows = records.map((r, i) => ({
      "SL": i + 1,
      "Unit No": r.unitNo,
      "Tower": r.tower,
      "Owner Name": r.ownerName || "",
      "Owner Mobile": r.ownerMobile || "",
      "Owner WhatsApp": r.ownerWhatsapp || "",
      "Owner Email": r.ownerEmail || "",
      "Is Rented": r.isRented ? "Yes" : "No",
      "Tenant Name": r.tenantName || "",
      "Tenant Mobile": r.tenantMobile || "",
      "Tenant Email": r.tenantEmail || "",
      "Status": r.status || "Pending",
      "Last Updated": r.lastUpdated || "—",
    }));
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(rows);
    const colW = [4, 14, 8, 28, 14, 14, 30, 10, 24, 14, 28, 12, 20];
    ws["!cols"] = colW.map(w => ({ wch: w }));
    XLSX.utils.book_append_sheet(wb, ws, "Resident Directory");
    XLSX.writeFile(wb, `RCCP_Resident_Directory_${new Date().toISOString().slice(0,10)}.xlsx`);
    notify("Excel downloaded!");
  };

  /* Admin login */
  const adminLogin = () => {
    if (adminPw === ADMIN_PASSWORD) { setAdminAuth(true); setAdminPwErr(false); setModal(null); setAdminPw(""); }
    else { setAdminPwErr(true); }
  };

  if (!loaded) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4" style={{ background: "var(--cream)" }}>
      <div className="text-5xl animate-pulse">🏢</div>
      <p className="playfair text-xl text-amber-800">Loading Directory…</p>
    </div>
  );

  /* ══════════════ HOME VIEW ══════════════ */
  if (view === "home") return (
    <div className="min-h-screen" style={{ background: "var(--cream)" }}>
      {toast && <Toast {...toast} />}

      {/* Header */}
      <div className="header-pattern border-b border-amber-200" style={{ background: "linear-gradient(135deg, #1A1410 0%, #3D2B1F 100%)" }}>
        <div className="max-w-3xl mx-auto px-5 py-8 text-center">
          <div className="text-amber-400 text-xs font-semibold tracking-[4px] uppercase mb-3">The Residency City Center · Patna</div>
          <h1 className="playfair text-3xl md:text-4xl font-bold text-white mb-2">Resident Contact Directory</h1>
          <p className="text-amber-200/60 text-sm">Verify and update your flat's contact information</p>
        </div>
      </div>

      <div className="max-w-2xl mx-auto px-5 py-10">

        {/* Instructions */}
        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-8">
          <div className="divider-ornament mb-4">How it works</div>
          <div className="grid grid-cols-3 gap-4 text-center text-sm">
            {[["1️⃣","Select Tower","Choose Tower A or B"],["2️⃣","Select Flat","Pick your unit number"],["3️⃣","Confirm & Update","Review and save your details"]].map(([icon,h,p])=>(
              <div key={h}>
                <div className="text-2xl mb-1">{icon}</div>
                <div className="font-semibold text-amber-900">{h}</div>
                <div className="text-amber-600 text-xs mt-0.5">{p}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Flat Selection */}
        <div className="bg-white rounded-2xl shadow-sm border border-amber-100 p-6 mb-6">
          <h2 className="playfair text-xl font-semibold text-amber-900 mb-5">Find Your Flat</h2>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <Fld label="Select Tower">
              <select value={selTower} onChange={e => { setSelTower(e.target.value); setSelUnit(""); setForm(null); }} className={INP}>
                <option value="">— Tower —</option>
                <option value="A">Tower A</option>
                <option value="B">Tower B</option>
              </select>
            </Fld>
            <Fld label="Select Flat No">
              <select value={selUnit} onChange={e => { setSelUnit(e.target.value); setForm(null); }} className={INP} disabled={!selTower}>

                  <option key={r.id} value={r.unitNo}>{r.unitNo}</option>

          </div>
          <button onClick={loadFlat} disabled={!selUnit}

        {form && (

            <div className="grid grid-cols-2 gap-4 mb-5 p-4 bg-amber-50 rounded-xl border border-amber-100">

              <div><div className={LBL}>Tower 🔒</div><div className="text-sm font-bold text-amber-900">Tower {form.tower}</div></div>
            </div>

            <div className="divider-ornament mb-5">Owner Details</div>

            <div className="space-y-4 mb-6">
              <Fld label="Owner Name">
                <input value={form.ownerName || ""} onChange={e => setForm({ ...form, ownerName: e.target.value })} className={INP} placeholder="Full name" />
              </Fld>
              <div className="grid grid-cols-2 gap-4">
                <Fld label="Mobile No">
                  <input value={form.ownerMobile || ""} onChange={e => setForm({ ...form, ownerMobile: e.target.value })} className={INP} placeholder="10-digit mobile" />
                </Fld>
                <Fld label="WhatsApp No (if different)">
                  <input value={form.ownerWhatsapp || ""} onChange={e => setForm({ ...form, ownerWhatsapp: e.target.value })} className={INP} placeholder="Leave blank if same" />
                </Fld>
              </div>
              <Fld label="Email Address">
                <input type="email" value={form.ownerEmail || ""} onChange={e => setForm({ ...form, ownerEmail: e.target.value })} className={INP} placeholder="email@example.com" />
              </Fld>
            </div>

            <div className="divider-ornament mb-5">Tenant Details</div>

            <div className="mb-5">
              <label className="flex items-center gap-3 cursor-pointer p-3 rounded-xl border border-amber-100 hover:bg-amber-50 transition-colors">
                <input type="checkbox" checked={form.isRented || false} onChange={e => setForm({ ...form, isRented: e.target.checked })} className="w-4 h-4 accent-amber-700" />
                <span className="text-sm font-semibold text-amber-900">This flat is currently rented out</span>
              </label>
            </div>

            {form.isRented && (
              <div className="space-y-4 mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100 fade-in">
                <Fld label="Tenant Name">
                  <input value={form.tenantName || ""} onChange={e => setForm({ ...form, tenantName: e.target.value })} className={INP} placeholder="Tenant's full name" />
                </Fld>
                <div className="grid grid-cols-2 gap-4">
                  <Fld label="Tenant Mobile">
                    <input value={form.tenantMobile || ""} onChange={e => setForm({ ...form, tenantMobile: e.target.value })} className={INP} placeholder="Mobile no" />
                  </Fld>
                  <Fld label="Tenant Email">
                    <input type="email" value={form.tenantEmail || ""} onChange={e => setForm({ ...form, tenantEmail: e.target.value })} className={INP} placeholder="Email" />
                  </Fld>
                </div>
              </div>
            )}

            <div className="flex gap-3">
              <button onClick={() => { setForm(null); setSelUnit(""); setSelTower(""); }} className="flex-1 py-3 bg-amber-50 text-amber-800 border border-amber-200 rounded-xl text-sm font-semibold hover:bg-amber-100 transition-colors">
                Cancel
              </button>
              <button onClick={submitForm} disabled={saving} className="btn-gold flex-1 py-3 rounded-xl text-sm disabled:opacity-50">
                {saving ? "Saving…" : "✓ Confirm & Save"}
              </button>
            </div>
          </div>
        )}

        {/* Admin link */}
        <div className="text-center mt-10 pt-6 border-t border-amber-100">
          <button onClick={() => { setView("admin"); if (!adminAuth) setModal("adminLogin"); }}
            className="text-xs text-amber-400 hover:text-amber-700 transition-colors font-medium">
            🔐 Admin Access
          </button>
          <div className="text-xs text-amber-300 mt-3">{APP_VERSION} · The Residency City Center Patna</div>
        </div>
      </div>

      {/* Admin Login Modal */}
      <Modal open={modal === "adminLogin"} onClose={() => { setModal(null); setView("home"); }} title="🔐 Admin Login">
        <div className="space-y-4">
          <Fld label="Password">
            <input type="password" value={adminPw} onChange={e => { setAdminPw(e.target.value); setAdminPwErr(false); }}
              onKeyDown={e => e.key === "Enter" && adminLogin()} className={INP} autoFocus placeholder="Enter admin password" />
          </Fld>
          {adminPwErr && <p className="text-red-600 text-xs font-semibold">❌ Incorrect password</p>}
          <div className="flex gap-3 pt-1">
            <button onClick={() => { setModal(null); setView("home"); }} className="flex-1 py-2.5 bg-amber-50 text-amber-800 border border-amber-200 rounded-xl text-sm font-semibold hover:bg-amber-100">Cancel</button>
            <button onClick={adminLogin} className="btn-gold flex-1 py-2.5 rounded-xl text-sm">Login</button>
          </div>
        </div>
      </Modal>
    </div>
  );

  /* ══════════════ ADMIN VIEW ══════════════ */
  if (view === "admin") {
    if (!adminAuth) return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: "var(--cream)" }}>
        {toast && <Toast {...toast} />}
        <div className="bg-white rounded-2xl shadow-sm border border-amber-100 p-8 max-w-sm w-full mx-4">
          <h2 className="playfair text-2xl font-bold text-amber-900 mb-6 text-center">Admin Login</h2>
          <div className="space-y-4">
            <Fld label="Password">
              <input type="password" value={adminPw} onChange={e => { setAdminPw(e.target.value); setAdminPwErr(false); }}
                onKeyDown={e => e.key === "Enter" && adminLogin()} className={INP} autoFocus />
            </Fld>
            {adminPwErr && <p className="text-red-600 text-xs font-semibold">❌ Incorrect password</p>}
            <button onClick={adminLogin} className="btn-gold w-full py-3 rounded-xl text-sm">Login →</button>
            <button onClick={() => setView("home")} className="w-full py-2 text-amber-500 text-sm hover:text-amber-700">← Back to Directory</button>
          </div>
        </div>
      </div>
    );

    return (

          </div>

            </select>
            <select value={adminFilter.status} onChange={e => setAdminFilter(f => ({ ...f, status: e.target.value }))}
              className="px-3 py-2 border border-amber-200 rounded-lg text-sm bg-white focus:outline-none">
              <option value="all">All Status</option>
              <option value="Pending">Pending</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Updated">Updated</option>
            </select>
            <span className="text-xs text-gray-400 self-center">{adminRecs.length} records</span>
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-amber-100 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr style={{ background: "linear-gradient(135deg, #1A1410, #3D2B1F)" }}>
                    {["#","Unit No","Tower","Owner Name","Mobile","WhatsApp","Email","Rented","Tenant","Status","Last Updated",""].map((h,i) => (
                      <th key={i} className="px-3 py-3 text-left text-xs font-semibold text-amber-300 uppercase tracking-wider whitespace-nowrap">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-amber-50">
                  {adminRecs.map((r, idx) => (
                    <tr key={r.id} className="hover:bg-amber-50/40 transition-colors">
                      <td className="px-3 py-3 text-xs text-gray-400">{idx+1}</td>
                      <td className="px-3 py-3 font-bold text-amber-900 whitespace-nowrap">{r.unitNo}</td>
                      <td className="px-3 py-3 text-center"><span className="px-2 py-0.5 bg-amber-100 text-amber-800 rounded-full text-xs font-bold">{r.tower}</span></td>
                      <td className="px-3 py-3 font-semibold text-gray-800 max-w-[160px] truncate">{r.ownerName || "—"}</td>
                      <td className="px-3 py-3 text-xs text-gray-600 whitespace-nowrap">{r.ownerMobile || "—"}</td>
                      <td className="px-3 py-3 text-xs text-gray-500">{r.ownerWhatsapp || <span className="text-gray-300">same</span>}</td>
                      <td className="px-3 py-3 text-xs text-gray-500 max-w-[160px] truncate">{r.ownerEmail || "—"}</td>
                      <td className="px-3 py-3 text-center text-xs">{r.isRented ? <span className="text-blue-600 font-bold">Yes</span> : <span className="text-gray-300">No</span>}</td>
                      <td className="px-3 py-3 text-xs text-gray-500 max-w-[120px] truncate">{r.isRented ? (r.tenantName || "—") : <span className="text-gray-300">—</span>}</td>
                      <td className="px-3 py-3 whitespace-nowrap"><StatusBadge status={r.status} /></td>
                      <td className="px-3 py-3 text-xs text-gray-400 whitespace-nowrap">{r.lastUpdated || "—"}</td>
                      <td className="px-3 py-3">
                        {r.status !== "Pending" && (
                          <button onClick={() => resetStatus(r.id)} title="Reset to Pending"
                            className="text-xs text-amber-400 hover:text-amber-700 font-semibold transition-colors whitespace-nowrap">↺ Reset</button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {adminRecs.length === 0 && <div className="text-center py-12 text-gray-300 text-sm">No records found</div>}
          </div>

        </div>

        {/* Add Flat Modal */}
        <Modal open={modal === "addFlat"} onClose={() => setModal(null)} title="➕ Add New Flat" wide>
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <Fld label="Unit No *"><input value={addFlatForm.unitNo} onChange={e => setAddFlatForm(f => ({ ...f, unitNo: e.target.value }))} className={INP} placeholder="e.g. CCPRA0106" autoFocus /></Fld>
              <Fld label="Tower *">
                <select value={addFlatForm.tower} onChange={e => setAddFlatForm(f => ({ ...f, tower: e.target.value }))} className={INP}>
                  <option value="A">Tower A</option>
                  <option value="B">Tower B</option>
                </select>
              </Fld>
            </div>
            <Fld label="Owner Name *"><input value={addFlatForm.ownerName} onChange={e => setAddFlatForm(f => ({ ...f, ownerName: e.target.value }))} className={INP} placeholder="Full name" /></Fld>
            <div className="grid grid-cols-2 gap-4">
              <Fld label="Owner Mobile"><input value={addFlatForm.ownerMobile} onChange={e => setAddFlatForm(f => ({ ...f, ownerMobile: e.target.value }))} className={INP} placeholder="Mobile no" /></Fld>
              <Fld label="Owner Email"><input value={addFlatForm.ownerEmail} onChange={e => setAddFlatForm(f => ({ ...f, ownerEmail: e.target.value }))} className={INP} placeholder="Email" /></Fld>
            </div>
            <div className="flex gap-3 pt-2 border-t border-amber-100">
              <button onClick={() => setModal(null)} className="flex-1 py-2.5 bg-amber-50 text-amber-800 border border-amber-200 rounded-xl text-sm font-semibold hover:bg-amber-100">Cancel</button>
              <button onClick={addFlat} className="btn-gold flex-1 py-2.5 rounded-xl text-sm">Add Flat</button>
            </div>
          </div>
        </Modal>

      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
